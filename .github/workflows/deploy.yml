name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Typecheck, Test, Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      # Sync server-side env vars from GitHub Secrets → Convex prod project.
      # GitHub Secrets is the single source of truth — no need to set these
      # manually in the Convex dashboard.
      - name: Sync Convex environment variables
        run: |
          npx convex env set WHATSAPP_ACCESS_TOKEN "${{ secrets.WHATSAPP_ACCESS_TOKEN }}" --prod
          npx convex env set WHATSAPP_PHONE_NUMBER_ID "${{ vars.WHATSAPP_PHONE_NUMBER_ID }}" --prod
          npx convex env set WHATSAPP_VERIFY_TOKEN "${{ secrets.WHATSAPP_VERIFY_TOKEN }}" --prod
          npx convex env set CLERK_JWT_ISSUER_DOMAIN "${{ secrets.CLERK_JWT_ISSUER_DOMAIN }}" --prod
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

      # Deploy Convex backend after env vars are synced.
      - name: Deploy Convex (backend)
        run: npx convex deploy --prod
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

      # Build the TanStack Start / Cloudflare Workers bundle.
      # VITE_* vars are inlined at build time by Vite.
      - name: Build frontend
        run: pnpm build
        env:
          VITE_CONVEX_URL: ${{ vars.VITE_CONVEX_URL }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ vars.VITE_CLERK_PUBLISHABLE_KEY }}

      - name: Deploy to Cloudflare Workers
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
